/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes splashFadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}

@keyframes splashOrbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@keyframes splashTitleIn{0%{opacity:0;transform:translateY(20px);letter-spacing:12px}100%{opacity:1;transform:translateY(0);letter-spacing:3px}}
@keyframes splashSubIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}

.splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#1a0a0b 0%,#2d1214 30%,#741E22 70%,#4a1012 100%);
  overflow:hidden}
.splash.out{animation:splashFadeOut .6s ease forwards}
.splash-dots{position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.06) 1px,transparent 0);background-size:40px 40px;animation:splashDotsMove 20s linear infinite}

.splash-orbit2{position:absolute;width:440px;height:440px;border:1px dashed rgba(230,151,54,.06);border-radius:50%;animation:splashOrbit 45s linear infinite reverse}
.splash-icon{width:120px;height:120px;border-radius:32px;background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.02));backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;animation:splashPlaneMove 1s cubic-bezier(.22,1,.36,1) both,splashGlow 3s ease-in-out 1s infinite;margin-bottom:28px;position:relative;z-index:2}
.splash-icon::before{content:'';position:absolute;inset:-3px;border-radius:35px;background:conic-gradient(from 180deg,transparent,rgba(230,151,54,.3),transparent,rgba(230,151,54,.15),transparent);animation:splashOrbit 6s linear infinite}

.splash-plane{width:76px;height:76px;position:relative;z-index:1}
.splash-title{font-family:'Outfit',sans-serif;font-size:1.7rem;font-weight:800;color:white;letter-spacing:3px;text-transform:uppercase;animation:splashTitleIn 1s cubic-bezier(.22,1,.36,1) .3s both;position:relative;z-index:2}
.splash-sub{font-family:'DM Sans',sans-serif;font-size:.72rem;color:rgba(230,151,54,.7);margin-top:8px;animation:splashSubIn .8s ease .7s both;position:relative;z-index:2;letter-spacing:2px;font-weight:500;text-transform:uppercase}
.splash-bar{width:120px;height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin-top:32px;overflow:hidden;position:relative;z-index:2;animation:splashSubIn .6s ease 1s both}
.splash-bar-fill{height:100%;width:0;background:linear-gradient(90deg,#E69736,#741E22);border-radius:2px;animation:splashBarFill 2.8s cubic-bezier(.4,0,.2,1) .8s forwards}

.proj-box{padding:10px 12px;background:rgba(255,255,255,.04);border-radius:10px;margin-top:4px;cursor:pointer;transition:all .25s ease;border:1px solid rgba(255,255,255,.05);position:relative}

.mn-c::-webkit-scrollbar{width:4px}.mn-c::-webkit-scrollbar-thumb{background:var(--brds);border-radius:2px}

/* BUTTONS — glass + neon glow */
.bt{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--bgc);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.74rem;font-weight:500;cursor:pointer;transition:all .35s cubic-bezier(.22,1,.36,1);white-space:nowrap;position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.bt::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:radial-gradient(circle,var(--pri-l),transparent 70%);transition:all .5s;border-radius:50%;transform:translate(-50%,-50%)}
.bt:hover{border-color:var(--brds);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.bt:hover::before{width:200px;height:200px}
.bt:active{transform:translateY(0) scale(.97);transition-duration:.1s}
[data-theme="dark"] .bt:hover{box-shadow:0 4px 20px rgba(0,0,0,.3)}
.bt-p{background:linear-gradient(135deg,rgb(116,30,34),rgb(155,45,50));color:#fff;border-color:transparent;box-shadow:0 2px 16px rgba(116,30,34,.3);font-weight:600;letter-spacing:.02em}
.bt-p:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(116,30,34,.4)}
.bt-p:active{transform:translateY(0);box-shadow:0 2px 8px rgba(116,30,34,.2)}
[data-theme="dark"] .bt-p{background:linear-gradient(135deg,rgb(200,90,94),rgb(225,120,115));box-shadow:0 2px 16px rgba(200,90,94,.3)}
[data-theme="dark"] .bt-p:hover{box-shadow:0 8px 30px rgba(200,90,94,.4)}
.bt-s{padding:5px 10px;font-size:.7rem}
.bt-xs{padding:3px 7px;font-size:.64rem}
.bt-i{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--rs)}
.bt-i svg{width:13px;height:13px;transition:transform .3s}
.bt-i:hover svg{transform:scale(1.2) rotate(-8deg)}
.bt-g{border:none;background:transparent}.bt-g::before{display:none}
.bt-g:hover{background:var(--sup-l);box-shadow:none}
.bt-d{color:var(--pri)}.bt-d:hover{background:var(--pri-l)}
.bt-sv{background:linear-gradient(135deg,#3a7d34,#4a9640);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(58,125,52,.25)}.bt-sv:hover{box-shadow:0 6px 24px rgba(58,125,52,.35)}

/* FORMS — floating labels feel, glow focus */
.fg{display:grid;gap:12px}.fg2{grid-template-columns:1fr 1fr}.fg3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:600px){.fg2,.fg3{grid-template-columns:1fr}}
.fgr{display:flex;flex-direction:column;gap:4px}
.fl{font-size:.64rem;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.06em;transition:color .3s}
.fgr:focus-within .fl{color:var(--pri)}
.fi,.fsel,.fta{padding:9px 13px;border:1.5px solid var(--brd);border-radius:var(--rs);background:var(--bgi);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.78rem;transition:all .35s cubic-bezier(.22,1,.36,1);outline:none}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l),0 4px 20px var(--pri-l);transform:translateY(-1px)}
[data-theme="dark"] .fi:focus,[data-theme="dark"] .fsel:focus,[data-theme="dark"] .fta:focus{box-shadow:0 0 0 3px var(--pri-l),0 4px 24px rgba(200,90,94,.15)}
.fsel{cursor:pointer}.fta{resize:vertical;min-height:48px}
.fc{background:var(--bgc);border:1px solid var(--brd);border-radius:var(--r);padding:22px;transition:all .4s cubic-bezier(.22,1,.36,1);animation:scaleIn .35s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pri),var(--sec),var(--pri));background-size:200% 100%;animation:gradientShift 4s ease infinite;opacity:.7}
.fc::after{content:'';position:absolute;top:3px;left:0;right:0;height:40px;background:linear-gradient(180deg,var(--pri-l),transparent);pointer-events:none;opacity:.3}
.fc:hover{box-shadow:0 8px 40px rgba(0,0,0,.07);border-color:var(--brds);transform:translateY(-2px)}
[data-theme="dark"] .fc:hover{box-shadow:0 8px 40px rgba(0,0,0,.3)}
.fct{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;margin-bottom:16px;color:var(--tx);display:flex;align-items:center;gap:8px}
.fac{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.fhi{font-size:.7rem;color:var(--txm);margin-top:-6px;margin-bottom:8px;line-height:1.5}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .25s ease;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.mob{background:var(--bgc);border:1px solid var(--brd);border-radius:16px;padding:24px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;animation:popIn .35s cubic-bezier(.22,1,.36,1);box-shadow:0 24px 80px rgba(0,0,0,.2);position:relative}
.mob::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pri),var(--sec));border-radius:16px 16px 0 0}
[data-theme="dark"] .mob{box-shadow:0 24px 80px rgba(0,0,0,.5);background:rgba(26,26,29,.98)}

/* DASHBOARD */
.dw{display:flex;flex-direction:column;gap:8px;height:100%;min-height:0;overflow:hidden}
.dtb{display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;animation:slideDown .5s ease both}
.dtb img.flag{width:38px;height:26px;border-radius:5px;object-fit:cover;box-shadow:0 3px 12px rgba(0,0,0,.18);animation:float 3.5s ease-in-out infinite}
.dtn{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.03em;background:linear-gradient(135deg,var(--tx),var(--pri));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dtd{font-size:.82rem;color:var(--sec);font-weight:600}
.dtr{font-size:.68rem;color:var(--txm);padding:4px 12px;background:var(--bge);border-radius:20px;font-weight:500}
.dsc{overflow-x:auto;flex:1;display:flex;flex-direction:column}
.dg{display:grid;grid-template-columns:78px minmax(145px,185px) 1fr 1fr 1fr;gap:1px;background:var(--brd);border-radius:14px;overflow:hidden;border:1px solid var(--brd);min-width:680px;flex:1;box-shadow:var(--shsm)}
.dh{background:var(--bge);padding:8px 5px;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txm);text-align:center;display:flex;align-items:center;justify-content:center;gap:3px}
.ddc{background:var(--bge);padding:6px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:all .2s}
.ddn{font-size:.52rem;font-weight:700;color:var(--pri);opacity:.8;letter-spacing:.05em}
.ddw{font-size:.66rem;font-weight:600;color:var(--tx2);line-height:1.15}
.ddd{font-size:.56rem;color:var(--txm);font-weight:500}
.dic{background:var(--bgc);padding:4px 5px;display:flex;flex-direction:column;gap:3px;font-size:.58rem;color:var(--txm);justify-content:center}
.ip{padding:3px 7px;border-radius:7px;background:var(--bge);display:flex;align-items:flex-start;gap:4px;line-height:1.2;transition:all .3s cubic-bezier(.22,1,.36,1);position:relative;cursor:pointer;border:1px solid transparent}
.ip:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.06);border-color:var(--brd);background:var(--bgc)}
[data-theme="dark"] .ip:hover{box-shadow:0 4px 14px rgba(0,0,0,.2)}
.ip:hover{background:var(--bgi)}
.ip svg{width:9px;height:9px;flex-shrink:0;margin-top:1px;opacity:.6}
.ipb{display:flex;flex-direction:column;min-width:0;flex:1}
.ipm{font-size:.6rem;font-weight:600;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ips{font-size:.52rem;color:var(--txm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ip.iph{border-left:3px solid var(--pri)}.ip.ipf{border-left:3px solid var(--sec)}

/* Expanded tooltip on hover/focus */
.ip .ip-full{display:none;position:absolute;left:-4px;top:calc(100% + 4px);z-index:80;background:var(--bgc);border:1px solid var(--brds);border-radius:8px;padding:8px 10px;min-width:180px;max-width:280px;box-shadow:0 8px 28px rgba(0,0,0,.12);animation:popIn .2s ease;pointer-events:none}
[data-theme="dark"] .ip .ip-full{box-shadow:0 8px 28px rgba(0,0,0,.4);background:var(--bgi)}
.ip .ip-full .ipm{white-space:normal;overflow:visible;font-size:.68rem;line-height:1.4}
.ip .ip-full .ips{white-space:normal;overflow:visible;font-size:.58rem;line-height:1.3;margin-top:2px}
.ip:hover .ip-full,.ip:focus .ip-full{display:block;pointer-events:auto}
.dce{background:var(--bgc);padding:3px;min-height:44px;display:flex;flex-direction:column;gap:2px;transition:all .25s}
.dce.m{background:var(--mbg)}.dce.a{background:var(--abg)}.dce.n{background:var(--nbg)}
.ac{padding:3px 7px;border-radius:6px;font-size:.6rem;font-weight:500;display:flex;align-items:center;gap:4px;background:var(--bgc);border:1px solid var(--brd);line-height:1.2;transition:all .3s cubic-bezier(.22,1,.36,1);cursor:default}
.ac:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 4px 12px rgba(0,0,0,.06);border-color:var(--brds)}
[data-theme="dark"] .ac:hover{box-shadow:0 4px 12px rgba(0,0,0,.2)}
.ac svg{width:10px;height:10px;flex-shrink:0}.ac .at{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ac .atm{font-size:.52rem;color:var(--txm);flex-shrink:0}
.cr{border-left:3px solid var(--sec)}.cp{border-left:3px solid var(--pri)}.ct{border-left:3px solid var(--sup)}.cf{border-left:3px solid #D85A30}.cc{border-left:3px solid #5B8C5A}.cd{border-left:3px solid #7A6BA0}

/* CITY SEPARATOR ROW */
.city-row{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:6px 16px;font-family:'Outfit',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:.03em;position:relative;overflow:hidden;animation:citySlide .45s cubic-bezier(.22,1,.36,1) both}
.city-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.city-row::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.1) 30%,transparent 100%);background-size:200% 100%;animation:shimmer 3.5s ease-in-out infinite;pointer-events:none}
.city-row .city-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;position:relative;animation:breathe 2s ease infinite}
.city-row .city-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid currentColor;opacity:.2;animation:ripple 3s ease infinite}
.city-row .city-line{flex:1;height:1px;opacity:.15;background:currentColor!important}
.city-row .city-icon{width:13px;height:13px;flex-shrink:0;opacity:.6}

/* TABLE — glass rows */
.tb{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--brd);border-radius:14px;overflow:hidden}
.tb th{background:var(--bge);padding:9px 13px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txm);text-align:left;border-bottom:2px solid var(--brd)}
.tb td{padding:9px 13px;font-size:.76rem;color:var(--tx2);border-bottom:1px solid var(--brd);background:var(--bgc);vertical-align:middle;transition:all .3s}
.tb tr:last-child td{border-bottom:none}
.tb tr:hover td{background:var(--bge);box-shadow:inset 3px 0 0 var(--pri)}
[data-theme="dark"] .tb tr:hover td{background:var(--bgi)}
.tda{width:64px;text-align:right;white-space:nowrap}
.tdai{display:flex;gap:3px;justify-content:flex-end}

/* CHARTS — glass cards */
.chr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}@media(max-width:768px){.chr{grid-template-columns:1fr}}
.chb{background:var(--bgc);border:1px solid var(--brd);border-radius:16px;padding:18px;display:flex;flex-direction:column;transition:all .35s cubic-bezier(.22,1,.36,1);animation:fadeUp .35s ease both;position:relative;overflow:hidden}
.chb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pri),var(--sec));opacity:.3}
.chb:nth-child(2){animation-delay:80ms}
.chb:hover{box-shadow:0 8px 28px rgba(0,0,0,.07);transform:translateY(-3px);border-color:var(--brds)}
[data-theme="dark"] .chb:hover{box-shadow:0 8px 28px rgba(0,0,0,.25)}
.chb h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:.82rem;margin-bottom:10px;color:var(--tx)}
.chb canvas{max-height:190px}
.str{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}@media(max-width:600px){.str{grid-template-columns:1fr 1fr}}
.stc{background:var(--bgc);border:1px solid var(--brd);border-radius:16px;padding:18px;text-align:center;transition:all .4s cubic-bezier(.22,1,.36,1);animation:scaleIn .4s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden}
.stc::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pri),var(--sec));opacity:.4;transition:all .4s}
.stc::after{content:'';position:absolute;top:-30%;right:-30%;width:80%;height:80%;background:radial-gradient(circle,var(--sec-l),transparent 70%);opacity:0;transition:opacity .5s;pointer-events:none}
.stc:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 16px 40px rgba(0,0,0,.1);border-color:var(--pri)}
.stc:hover::before{opacity:1;height:4px}
.stc:hover::after{opacity:.6}
[data-theme="dark"] .stc:hover{box-shadow:0 16px 40px rgba(0,0,0,.35)}
.stc:nth-child(1){animation-delay:0ms}.stc:nth-child(2){animation-delay:80ms}.stc:nth-child(3){animation-delay:160ms}.stc:nth-child(4){animation-delay:240ms}
.stn{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--pri),var(--sec));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 4px rgba(116,30,34,.15))}
.stl{font-size:.62rem;color:var(--txm);margin-top:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.lgr{display:flex;gap:9px;flex-wrap:wrap;padding:2px 0;align-items:center;flex-shrink:0}
.lgi{display:flex;align-items:center;gap:3px;font-size:.62rem;color:var(--txm)}.lgd{width:6px;height:6px;border-radius:2px;flex-shrink:0}

/* DESTINATION INFO CARDS — futuristic glass */

@keyframes diPulseRing{0%{transform:scale(1);opacity:.3}100%{transform:scale(2.2);opacity:0}}
@keyframes diCountUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.di-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:18px}
.di-card{background:var(--bgc);border:1px solid var(--brd);border-radius:20px;padding:22px;position:relative;overflow:hidden;animation:scaleIn .45s cubic-bezier(.22,1,.36,1) both;transition:all .4s cubic-bezier(.22,1,.36,1)}
.di-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;transition:height .3s}
.di-card::after{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;opacity:0;transition:all .5s;pointer-events:none}
.di-card:hover{transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,.1);border-color:transparent}
.di-card:hover::before{height:4px}
.di-card:hover::after{opacity:.12;transform:scale(1.3)}
[data-theme="dark"] .di-card:hover{box-shadow:0 16px 48px rgba(0,0,0,.35)}
.di-card:nth-child(n+1){animation-delay:calc(var(--i,0) * 70ms)}

/* Card accent colors via CSS var */
.di-card[data-accent="fire"]::before{background:linear-gradient(90deg,#FF6B35,#FFA726)}
.di-card[data-accent="fire"]::after{background:radial-gradient(circle,#FF6B35,transparent 70%)}
.di-card[data-accent="sky"]::before{background:linear-gradient(90deg,#42A5F5,#26C6DA)}
.di-card[data-accent="sky"]::after{background:radial-gradient(circle,#42A5F5,transparent 70%)}
.di-card[data-accent="storm"]::before{background:linear-gradient(90deg,#5C6BC0,#7E57C2)}
.di-card[data-accent="storm"]::after{background:radial-gradient(circle,#5C6BC0,transparent 70%)}
.di-card[data-accent="mint"]::before{background:linear-gradient(90deg,#26A69A,#66BB6A)}
.di-card[data-accent="mint"]::after{background:radial-gradient(circle,#26A69A,transparent 70%)}
.di-card[data-accent="rose"]::before{background:linear-gradient(90deg,#EF5350,#EC407A)}
.di-card[data-accent="rose"]::after{background:radial-gradient(circle,#EF5350,transparent 70%)}
.di-card[data-accent="gold"]::before{background:linear-gradient(90deg,#FFA726,#FF7043)}
.di-card[data-accent="gold"]::after{background:radial-gradient(circle,#FFA726,transparent 70%)}
.di-card[data-accent="violet"]::before{background:linear-gradient(90deg,#AB47BC,#7E57C2)}
.di-card[data-accent="violet"]::after{background:radial-gradient(circle,#AB47BC,transparent 70%)}
.di-card[data-accent="teal"]::before{background:linear-gradient(90deg,#00ACC1,#26A69A)}
.di-card[data-accent="teal"]::after{background:radial-gradient(circle,#00ACC1,transparent 70%)}
.di-card[data-accent="ice"]::before{background:linear-gradient(90deg,#29B6F6,#4FC3F7)}
.di-card[data-accent="ice"]::after{background:radial-gradient(circle,#29B6F6,transparent 70%)}

.di-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.di-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.di-ico::after{content:'';position:absolute;inset:0;border-radius:12px;animation:diPulseRing 3s ease-in-out infinite;border:2px solid currentColor;opacity:0}
.di-card:hover .di-ico::after{animation:diPulseRing 2s ease-in-out infinite}
.di-ico svg{width:18px;height:18px;transition:transform .3s}
.di-card:hover .di-ico svg{transform:scale(1.15)}
.di-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:.84rem;color:var(--tx)}
.di-sub{font-size:.58rem;color:var(--txm);margin-top:1px;letter-spacing:.03em}
.di-val{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:800;line-height:1.2;margin:6px 0;animation:diCountUp .5s ease both}
.di-val-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.di-val-sm{font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;opacity:.7}
.di-desc{font-size:.72rem;color:var(--tx2);line-height:1.6;margin-top:6px}
.di-desc strong{color:var(--tx);font-weight:600}
.di-bar{height:6px;border-radius:3px;background:var(--bge);margin-top:10px;overflow:hidden;position:relative}
.di-bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.di-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:.6rem;font-weight:600;margin-top:8px;margin-right:4px}
.di-load{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 20px;text-align:center;color:var(--txm)}
.di-spin{width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
.di-err{text-align:center;padding:40px 20px;color:var(--txm);font-size:.82rem}
@media(max-width:430px){.di-grid{grid-template-columns:1fr}.di-card{padding:18px}.di-val{font-size:1.2rem}.di-card:hover{transform:none}}

/* Temperature visual */
.di-temp-row{display:flex;gap:10px;margin:8px 0}
.di-temp-item{flex:1;text-align:center;padding:8px 4px;border-radius:10px;position:relative;overflow:hidden}
.di-temp-item::before{content:'';position:absolute;inset:0;opacity:.08}
.di-temp-label{font-size:.52rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600;opacity:.6}
.di-temp-val{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:800;margin-top:2px}

/* CHECKLIST */
.cl-cats{display:flex;flex-direction:column;gap:16px}
.cl-cat{background:var(--bgc);border:1px solid var(--brd);border-radius:16px;overflow:hidden;animation:scaleIn .35s ease both}
.cl-cat-hd{padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .2s;user-select:none}
.cl-cat-hd:hover{background:var(--bge)}
.cl-cat-hd svg{width:16px;height:16px;opacity:.5}
.cl-cat-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:.88rem;flex:1}
.cl-cat-count{font-size:.62rem;color:var(--txm);background:var(--bge);padding:2px 8px;border-radius:10px}
.cl-cat-prog{height:3px;background:var(--bge);margin:0 18px}
.cl-cat-prog-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--sec));border-radius:2px;transition:width .4s}
.cl-items{padding:6px 12px 12px}
.cl-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;transition:all .2s;cursor:pointer}
.cl-item:hover{background:var(--bge)}
.cl-item.done{opacity:.5}
.cl-item.done .cl-text{text-decoration:line-through}
.cl-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--brds);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;background:var(--bgi)}
.cl-item.done .cl-cb{background:linear-gradient(135deg,var(--pri),var(--sec));border-color:transparent;box-shadow:0 2px 8px rgba(116,30,34,.2)}
[data-theme="dark"] .cl-item.done .cl-cb{box-shadow:0 2px 8px rgba(200,90,94,.2)}
.cl-text{font-size:.8rem;color:var(--tx);flex:1}
.cl-del{opacity:0;transition:opacity .2s;background:none;border:none;color:var(--txm);cursor:pointer;padding:4px}
.cl-item:hover .cl-del{opacity:.6}
.cl-del:hover{color:var(--pri);opacity:1!important}
.cl-add{display:flex;gap:8px;padding:4px 8px}
.cl-add .fi{flex:1;font-size:.78rem;padding:8px 12px}
@media(max-width:430px){.cl-cat-hd{padding:12px 14px}.cl-items{padding:4px 8px 10px}.cl-item{padding:10px 6px}.cl-cb{width:22px;height:22px}.cl-text{font-size:.82rem}}

/* NOTES */
.nt-grid{display:flex;flex-direction:column;gap:12px}
.nt-card{background:var(--bgc);border:1px solid var(--brd);border-radius:14px;padding:16px;position:relative;overflow:hidden;animation:fadeUp .35s ease both;transition:all .3s}
.nt-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px}
.nt-card:nth-child(6n+1)::before{background:#FF6B35}
.nt-card:nth-child(6n+2)::before{background:#42A5F5}
.nt-card:nth-child(6n+3)::before{background:#66BB6A}
.nt-card:nth-child(6n+4)::before{background:#AB47BC}
.nt-card:nth-child(6n+5)::before{background:#EF5350}
.nt-card:nth-child(6n+6)::before{background:#FFA726}
.nt-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
[data-theme="dark"] .nt-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.2)}
.nt-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nt-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:.86rem;color:var(--tx);flex:1}
.nt-date{font-size:.58rem;color:var(--txm)}
.nt-body{font-size:.78rem;color:var(--tx2);line-height:1.6;white-space:pre-wrap}
.nt-actions{display:flex;gap:4px;margin-top:10px;justify-content:flex-end}
@media(max-width:430px){.nt-card{padding:14px}.nt-title{font-size:.84rem}.nt-body{font-size:.8rem}}

/* FINANCE DASHBOARD */
.fin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.fin-card{background:var(--bgc);border:1px solid var(--brd);border-radius:14px;padding:16px;transition:all .35s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden;animation:scaleIn .35s ease both}
.fin-card::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transition:left .6s}
.fin-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 8px 28px rgba(0,0,0,.08)}
.fin-card:hover::after{left:150%}
[data-theme="dark"] .fin-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.25)}
.fin-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 var(--r) var(--r)}
.fin-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.fin-val{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.2rem;line-height:1}
.fin-label{font-size:.6rem;color:var(--txm);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.fin-total{background:linear-gradient(135deg,var(--pri-l),var(--sec-l));border:1px solid var(--pri);position:relative}
.fin-total::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);background-size:200% 100%;animation:shimmer 4s ease infinite;pointer-events:none}
.fin-total .fin-val{background:linear-gradient(135deg,var(--pri),var(--sec));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:1.5rem}
.fin-input-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;margin-bottom:12px}
.fin-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.fin-table th{background:var(--bge);padding:8px 10px;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txm);text-align:left;border-bottom:1px solid var(--brd)}
.fin-table td{padding:8px 10px;font-size:.76rem;color:var(--tx2);border-bottom:1px solid var(--brd);background:var(--bgc)}
.fin-table tr:last-child td{border-bottom:none}
.fin-table tr:hover td{background:var(--bge)}
.fin-table .ft-val{font-weight:600;color:var(--tx);font-family:'Outfit',sans-serif}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txm);gap:14px;padding:60px 20px;text-align:center;animation:fadeUp .6s ease both}
.es svg{width:48px;height:48px;opacity:.15;animation:float 4s ease-in-out infinite;filter:drop-shadow(0 4px 12px var(--pri-l))}
.es p{font-size:.82rem;line-height:1.5}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:linear-gradient(135deg,var(--bgc),var(--bge));border:1px solid var(--brd);border-left:4px solid #3a7d34;border-radius:12px;padding:14px 20px;font-size:.78rem;font-weight:500;color:var(--tx);box-shadow:0 16px 48px rgba(0,0,0,.14);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);animation:popIn .4s cubic-bezier(.22,1,.36,1),toOut .4s ease 2.2s forwards}
[data-theme="dark"] .toast{box-shadow:0 16px 48px rgba(0,0,0,.5);background:linear-gradient(135deg,rgba(26,26,29,.95),rgba(34,34,37,.95))}

/* PROJECTS */
.pcard{background:var(--bgc);border:1px solid var(--brd);border-radius:18px;padding:20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .45s cubic-bezier(.22,1,.36,1);margin-bottom:12px;animation:fadeUp .4s ease both;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:-50%;right:-50%;width:120%;height:120%;background:radial-gradient(circle,var(--sec-l),transparent 60%);opacity:0;transition:opacity .6s;pointer-events:none}
.pcard::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);transition:left .7s}
.pcard:hover{border-color:var(--pri);box-shadow:0 16px 48px rgba(116,30,34,.14);transform:translateY(-6px) scale(1.015)}
.pcard:hover::before{opacity:1}
.pcard:hover::after{left:150%}
[data-theme="dark"] .pcard:hover{box-shadow:0 16px 48px rgba(200,90,94,.18)}
.pcard.active{border-color:var(--pri);box-shadow:0 0 0 2px var(--pri-l),0 6px 24px var(--pri-l)}
.pcard-icon{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--pri-l),var(--sec-l));color:var(--pri);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;transition:all .45s cubic-bezier(.22,1,.36,1)}
.pcard:hover .pcard-icon{transform:rotate(-8deg) scale(1.12);box-shadow:0 6px 20px var(--pri-l)}
.pcard-icon img{width:48px;height:48px;border-radius:13px;object-fit:cover}
.pcard-body{flex:1;min-width:0}
.pcard-name{font-family:'Outfit',sans-serif;font-weight:700;font-size:.92rem;color:var(--tx);display:flex;align-items:center;gap:6px}
.pcard-name img{width:20px;height:14px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 .5px rgba(0,0,0,.15)}
.pcard-dest{font-size:.74rem;color:var(--sec);font-weight:600}
.pcard-meta{font-size:.64rem;color:var(--txm);margin-top:3px}
.pcard-actions{display:flex;gap:5px;flex-shrink:0}

/* ═══ TOUCH DEVICES — disable hover transforms that cause jumping ═══ */
@media(hover:none){
  .bt:hover,.fc:hover,.stc:hover,.pcard:hover,.chb:hover,.fin-card:hover,.ac:hover,.ip:hover,.tb tr:hover td{transform:none!important}
  .pcard:hover .pcard-icon{transform:none!important}
  .nav-i:hover{transform:none!important}
  .stc:hover::after,.pcard::after,.fin-card::after{display:none!important}
}

/* ═══ MOBILE — iPhone 17 Pro (402x874pt viewport, safe areas top:62 bottom:34) ═══ */
@media(max-width:430px){
  /* Safe areas for notch + home indicator */
  .app{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

  /* Splash — fullscreen mobile */

  .splash-title{font-size:1.4rem;letter-spacing:2px}
  .splash-sub{font-size:.65rem;letter-spacing:1.5px}
  .splash-orbit{width:220px;height:220px}
  .splash-orbit2{width:320px;height:320px}
  .splash-bar{width:100px}

  /* Sidebar fullscreen overlay — dark premium */
  .sb{width:88vw;min-width:88vw}
  .sb::after{display:none}
  .sb-hd{padding:calc(16px + env(safe-area-inset-top)) 16px 14px}
  .sb-logo{width:34px;height:34px;border-radius:10px}

  .sb-brand small{font-size:.58rem}
  .proj-box{padding:10px 12px;border-radius:10px;transform:none!important}
  .proj-box:hover{transform:none!important;box-shadow:none}
  .proj-box-name{font-size:.78rem}
  .proj-box-dest{font-size:.66rem}
  .nav-sec{font-size:.5rem;padding:14px 16px 4px}
  .nav-i{padding:13px 14px;font-size:.84rem;gap:10px;border-radius:12px;min-height:46px}
  .nav-i:hover{transform:none}
  .nav-i svg{width:18px;height:18px}
  .nav-i .nb{font-size:.62rem;padding:3px 9px;border-radius:10px}
  .sb-ft{padding:12px 14px;padding-bottom:calc(14px + env(safe-area-inset-bottom))}
  .sb-ft .bt{padding:12px 16px;font-size:.8rem;border-radius:12px;width:100%;justify-content:center;min-height:48px}

  /* Topbar compact — taller for touch */
  .mn-top{height:54px;padding:0 14px;padding-top:env(safe-area-inset-top)}
  .mn-top::after{display:none}
  .pg-t{font-size:.88rem;font-weight:600}
  .ham{width:40px;height:40px;border-radius:10px}
  .ham svg{width:20px;height:20px}

  /* Content area — generous padding */
  .mn-c{padding:16px 14px;background-size:20px 20px;-webkit-overflow-scrolling:touch}

  /* Buttons — Apple HIG 44px minimum, no hover translate on touch */
  .bt{padding:11px 16px;font-size:.8rem;border-radius:12px;min-height:44px;gap:6px}
  .bt:hover{transform:none}
  .bt-p:hover{transform:none}
  .bt-s{padding:9px 14px;font-size:.76rem;min-height:40px}
  .bt-p{padding:13px 20px;font-size:.84rem;min-height:48px}
  .bt-i{width:40px;height:40px;border-radius:11px}
  .bt-i svg{width:16px;height:16px}
  .bt-xs{min-height:32px;padding:4px 10px;font-size:.64rem}

  /* Forms — comfortable touch input */
  .fi,.fsel,.fta{padding:12px 14px;font-size:.88rem;border-radius:12px;min-height:48px}
  .fta{min-height:80px}
  .fl{font-size:.7rem;margin-bottom:4px}
  .fc{padding:18px 16px;border-radius:16px}

  .fac .bt{flex:1;justify-content:center;min-width:120px}
  .fg{gap:12px}
  .fg2,.fg3{grid-template-columns:1fr}
  .fhi{font-size:.74rem;line-height:1.6}

  /* Dashboard — 6-col grid with scroll */
  .dw{gap:12px}
  .dtb{gap:6px;padding:0;flex-wrap:wrap}
  .dtb img.flag{width:28px;height:19px}
  .dtn{font-size:1rem}
  .dtd{font-size:.72rem}
  .dtr{font-size:.62rem;padding:2px 8px}
  .dsc{overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;padding-bottom:4px}
  .dg{min-width:560px;grid-template-columns:66px minmax(120px,155px) 1fr 1fr 1fr}
  .dh{padding:8px 4px;font-size:.58rem}
  .ddc{padding:6px 4px}
  .ddn{font-size:.48rem}
  .ddw{font-size:.6rem}
  .ddd{font-size:.52rem}
  .dic{padding:4px}
  .ip{padding:4px 5px;border-radius:6px}
  .ip svg{width:10px;height:10px}
  .ipm{font-size:.6rem}
  .ips{font-size:.5rem}
  .dce{padding:4px;min-height:40px}
  .ac{padding:4px 6px;font-size:.6rem;border-radius:6px}
  .ac svg{width:10px;height:10px}
  .atm{font-size:.5rem}
  .city-row{padding:5px 10px;font-size:.68rem}
  .city-dot{width:7px;height:7px}
  .city-icon{width:12px;height:12px}
  .lgr{gap:6px;padding:4px 0}
  .lgi{font-size:.6rem}
  .lgd{width:6px;height:6px}
  .wth{display:none}

  /* Tables — horizontal scroll on mobile */
  .tb{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}
  .tb table{min-width:480px}
  .tb th{padding:10px 8px;font-size:.6rem;white-space:nowrap}
  .tb td{padding:10px 8px;font-size:.76rem}
  .tda{width:80px}
  .tdai{gap:6px}
  .tdai .bt-i{width:36px;height:36px}

  /* Finance */
  .fin-grid{grid-template-columns:1fr 1fr;gap:8px}
  .fin-card{padding:12px;border-radius:12px}
  .fin-card:hover{transform:none}
  .fin-icon{width:28px;height:28px;border-radius:7px}
  .fin-val{font-size:1rem}
  .fin-label{font-size:.56rem}
  .fin-total .fin-val{font-size:1.2rem}
  .fin-table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}
  .fin-table th{padding:8px;font-size:.58rem;white-space:nowrap}
  .fin-table td{padding:8px;font-size:.74rem}

  /* Stats */
  .str{grid-template-columns:1fr 1fr;gap:8px}
  .stc{padding:14px;border-radius:14px}
  .stc::before{height:3px}
  .stc:hover{transform:none}
  .stn{font-size:1.3rem}

  .chr{grid-template-columns:1fr;gap:10px}

  .chb h3{font-size:.82rem}

  /* Project cards — big touch areas, no hover translate */
  .pcard{padding:16px;border-radius:16px;margin-bottom:12px}

  .ip .ip-full{position:fixed;left:8px;right:8px;bottom:calc(12px + env(safe-area-inset-bottom));top:auto;min-width:auto;max-width:none;z-index:300;border-radius:14px;padding:14px 16px;box-shadow:0 -8px 40px rgba(0,0,0,.15)}
  [data-theme="dark"] .ip .ip-full{box-shadow:0 -8px 40px rgba(0,0,0,.4)}

  /* Dest Info — single column */
  .di-grid{grid-template-columns:1fr;gap:12px}

/* ── TIMELINE PORTRAIT ── */
#print-timeline{display:none}
body.print-portrait .app{display:none!important}
body.print-portrait #print-layer{display:none!important}
body.print-portrait #print-timeline{display:block!important;width:100%!important;padding:6mm 8mm!important;background:#fff!important;color:#1A1A1A!important;overflow:visible!important}
body.print-portrait #print-timeline *{animation:none!important;transition:none!important}
body.print-portrait #print-timeline .pt-header{display:flex;align-items:center;gap:3mm;margin-bottom:4mm;padding-bottom:3mm;border-bottom:1.5px solid #ddd}

body.print-portrait #print-timeline .pt-city-hdr svg{width:12px;height:12px}
body.print-portrait #print-timeline .pt-city-line{flex:1;height:1px;opacity:.3}

body.print-portrait #print-timeline .pt-day-head{display:flex;align-items:center;gap:2mm;margin-bottom:1.5mm}
body.print-portrait #print-timeline .pt-badge{font-size:7pt;padding:1px 6px;background:rgba(116,30,34,.08);color:rgb(116,30,34);border-radius:8px;font-weight:700;font-family:'Outfit',sans-serif}
body.print-portrait #print-timeline .pt-weekday{font-size:9pt;font-weight:600;color:#1A1A1A}
body.print-portrait #print-timeline .pt-dm{font-size:8pt;color:#58585B}
body.print-portrait #print-timeline .pt-info{display:flex;align-items:center;gap:1.5mm;padding:1.5mm 2.5mm;font-size:8pt;background:#f5f4f0;border-radius:1.5mm;margin-bottom:1mm}
body.print-portrait #print-timeline .pt-info svg{width:10px;height:10px;flex-shrink:0}
body.print-portrait #print-timeline .pt-info-name{font-weight:600;color:#333}
body.print-portrait #print-timeline .pt-info-sub{color:#666}
body.print-portrait #print-timeline .pt-period{display:flex;align-items:center;gap:1.5mm;font-size:7pt;text-transform:uppercase;letter-spacing:.5px;color:#888;font-weight:600;margin:1.5mm 0 .5mm}
body.print-portrait #print-timeline .pt-period svg{width:9px;height:9px}
body.print-portrait #print-timeline .pt-act{display:flex;align-items:center;gap:1.5mm;font-size:8.5pt;padding:1mm 0;border-bottom:.5px solid #eee}
body.print-portrait #print-timeline .pt-act:last-child{border-bottom:none}
body.print-portrait #print-timeline .pt-act-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
body.print-portrait #print-timeline .pt-act svg{width:10px;height:10px;flex-shrink:0}
body.print-portrait #print-timeline .pt-act-time{font-size:7pt;color:#888;margin-left:auto}
body.print-portrait #print-timeline .pt-empty{font-size:8pt;color:#aaa;font-style:italic}
}

  const dupProj=id=>{const src=projects.find(p=>p.id===id);if(!src)return;const cp={...JSON.parse(JSON.stringify(src)),id:Date.now(),name:src.name+' (cópia)',createdAt:new Date().toISOString()};setProjects(ps=>[...ps,cp]);tt('Duplicado!')};

  return(<>{splash&&<div className={`splash ${splashOut?'out':''}`}>
    <div className="splash-dots"/>
    <div className="splash-orbit"/>
    <div className="splash-orbit2"/>
    <div className="splash-icon">
      <svg className="splash-plane" viewBox="0 0 80 80" fill="none">
        <defs>
          <linearGradient id="sp-globe" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#E69736"/><stop offset="100%" stopColor="#D4782A"/></linearGradient>
          <linearGradient id="sp-arc" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#FFD54F"/><stop offset="50%" stopColor="#E69736"/><stop offset="100%" stopColor="#FF8F00"/></linearGradient>
          <linearGradient id="sp-shine" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stopColor="rgba(255,255,255,0.4)"/><stop offset="100%" stopColor="rgba(255,255,255,0)"/></linearGradient>
          <filter id="sp-glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <circle cx="40" cy="40" r="28" fill="none" stroke="url(#sp-globe)" strokeWidth="1.8" opacity=".7"/>
        <ellipse cx="40" cy="40" rx="14" ry="28" fill="none" stroke="url(#sp-globe)" strokeWidth=".8" opacity=".4"/>
        <ellipse cx="40" cy="40" rx="22" ry="28" fill="none" stroke="url(#sp-globe)" strokeWidth=".5" opacity=".25"/>
        <line x1="12" y1="40" x2="68" y2="40" stroke="url(#sp-globe)" strokeWidth=".6" opacity=".3"/>
        <line x1="12" y1="28" x2="68" y2="28" stroke="url(#sp-globe)" strokeWidth=".4" opacity=".15"/>
        <line x1="12" y1="52" x2="68" y2="52" stroke="url(#sp-globe)" strokeWidth=".4" opacity=".15"/>
        <circle cx="40" cy="40" r="28" fill="url(#sp-shine)" opacity=".3"/>
        <path d="M18 48Q30 22 55 28Q68 38 58 55" fill="none" stroke="url(#sp-arc)" strokeWidth="2.5" strokeLinecap="round" filter="url(#sp-glow)"/>
        <circle cx="18" cy="48" r="3.5" fill="#FFD54F" filter="url(#sp-glow)"/>
        <circle cx="18" cy="48" r="1.5" fill="white"/>
        <path d="M58 49l-4 10 4-3 4 3z" fill="url(#sp-arc)" filter="url(#sp-glow)"/>
        <circle cx="58" cy="49" r="2" fill="white" opacity=".8"/>
      </svg>
    </div>
    <div className="splash-title">Meu Roteiro</div>
    <div className="splash-sub">by Anderson Nishiura</div>
    <div className="splash-bar"><div className="splash-bar-fill"/></div>
  </div>}<div className="app">
    <div className={`sb-ov ${sbOpen?'show':''}`} onClick={()=>setSbOpen(false)}/>
    <aside className={`sb ${sbOpen?'open':''}`}>
      <div className="sb-hd">
        <div className="sb-hd-top"><div className="sb-logo"><svg viewBox="0 0 80 80" fill="none" style={{width:22,height:22}}>
          <defs>
            <linearGradient id="sb-globe" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#E69736"/><stop offset="100%" stopColor="#D4782A"/></linearGradient>
            <linearGradient id="sb-arc" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#FFD54F"/><stop offset="50%" stopColor="#E69736"/><stop offset="100%" stopColor="#FF8F00"/></linearGradient>
            <linearGradient id="sb-shine" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stopColor="rgba(255,255,255,0.4)"/><stop offset="100%" stopColor="rgba(255,255,255,0)"/></linearGradient>
            <filter id="sb-glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <circle cx="40" cy="40" r="28" fill="none" stroke="url(#sb-globe)" strokeWidth="1.8" opacity=".7"/>
          <ellipse cx="40" cy="40" rx="14" ry="28" fill="none" stroke="url(#sb-globe)" strokeWidth=".8" opacity=".4"/>
          <ellipse cx="40" cy="40" rx="22" ry="28" fill="none" stroke="url(#sb-globe)" strokeWidth=".5" opacity=".25"/>
          <line x1="12" y1="40" x2="68" y2="40" stroke="url(#sb-globe)" strokeWidth=".6" opacity=".3"/>
          <line x1="12" y1="28" x2="68" y2="28" stroke="url(#sb-globe)" strokeWidth=".4" opacity=".15"/>
          <line x1="12" y1="52" x2="68" y2="52" stroke="url(#sb-globe)" strokeWidth=".4" opacity=".15"/>
          <circle cx="40" cy="40" r="28" fill="url(#sb-shine)" opacity=".3"/>
          <path d="M18 48Q30 22 55 28Q68 38 58 55" fill="none" stroke="url(#sb-arc)" strokeWidth="2.5" strokeLinecap="round" filter="url(#sb-glow)"/>
          <circle cx="18" cy="48" r="3.5" fill="#FFD54F" filter="url(#sb-glow)"/>
          <circle cx="18" cy="48" r="1.5" fill="white"/>
          <path d="M58 49l-4 10 4-3 4 3z" fill="url(#sb-arc)" filter="url(#sb-glow)"/>
          <circle cx="58" cy="49" r="2" fill="white" opacity=".8"/>
        </svg></div><div className="sb-brand">Meu Roteiro<small>by Anderson Nishiura</small></div></div>
        {proj&&<div className="proj-box" onClick={()=>nav('projects')}>
          <div className="proj-box-label">Projeto Ativo <I.folderOpen style={{width:9,height:9}}/></div>
          <div className="proj-box-name"><FlagImg code={flagCode} size={18}/>{proj.name||'Sem nome'}</div>
          {proj.dest&&<div className="proj-box-dest">{proj.dest}</div>}
        </div>}
      </div>
      <nav className="sb-nav">
        {NAV.map((it,i)=>it.sec!==undefined?<div key={i} className="nav-sec">{it.sec}</div>:<button key={it.id} className={`nav-i ${page===it.id?'act':''}`} onClick={()=>nav(it.id)} disabled={it.id!=='projects'&&it.id!=='backup'&&!activeId}><it.ic style={{width:14,height:14}}/>{it.l}{it.b!=null&&<span className="nb">{it.b}</span>}</button>)}
      </nav>
      <div className="sb-ft"><button className="bt bt-g bt-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setTheme(t=>t==='light'?'dark':'light')}>{theme==='light'?<I.moon style={{width:11,height:11}}/>:<I.sun style={{width:11,height:11}}/>}{theme==='light'?'Modo Escuro':'Modo Claro'}</button></div>
    </aside>
    <div className="mn">
      <header className="mn-top">
        <div className="mn-top-l"><button className="ham" onClick={()=>setSbOpen(true)}><I.menu/></button><span className="pg-t">{titles[page]||''}</span></div>
        <div style={{display:'flex',gap:4}}>
          {page==='dashboard'&&activeId&&<button className="bt bt-g bt-s" onClick={handlePrint}><I.printer style={{width:12,height:12}}/> Imprimir</button>}
          {page==='timeline'&&activeId&&<button className="bt bt-g bt-s" onClick={handlePrintTimeline}><I.printer style={{width:12,height:12}}/> Imprimir A4</button>}
          <button className="bt bt-g bt-i" onClick={()=>setTheme(t=>t==='light'?'dark':'light')}>{theme==='light'?<I.moon style={{width:12,height:12}}/>:<I.sun style={{width:12,height:12}}/>}</button>
        </div>
      </header>
      <div className="mn-c">
        <div key={pageKey} className="page-enter">
          {page==='projects'&&<ProjectsPage projects={projects} activeId={activeId} onNew={newProj} onOpen={openProj} onDel={delProj} onDup={dupProj}/>}
          {page==='dashboard'&&<DashboardPage data={data} flagCode={flagCode}/>}
          {page==='timeline'&&<TimelinePage data={data} flagCode={flagCode}/>}
          {page==='dest-info'&&<DestInfoPage data={data} flagCode={flagCode}/>}
          {page==='ai-tips'&&<AiTipsPage data={data} flagCode={flagCode}/>}
          {page==='finance'&&<FinancePage data={data} upd={upd} tt={tt} em={setModal}/>}
          {page==='stats'&&<StatsPage data={data}/>}
          {page==='trip-info'&&<TripInfoPage data={data} upd={upd} tt={tt}/>}
          {page==='trip-days'&&<TripDaysPage data={data} upd={upd} tt={tt}/>}
          {page==='cities'&&<CitiesPage data={data} upd={upd} tt={tt} em={setModal}/>}
          {page==='activities'&&<ActivitiesPage data={data} upd={upd} tt={tt} em={setModal}/>}
          {page==='hotels'&&<HotelsPage data={data} upd={upd} tt={tt} em={setModal}/>}
          {page==='flights'&&<FlightsPage data={data} upd={upd} tt={tt} em={setModal}/>}
          {page==='checklist'&&<ChecklistPage data={data} upd={upd} tt={tt}/>}
          {page==='notes'&&<NotesPage data={data} upd={upd} tt={tt}/>}
          {page==='backup'&&<BackupPage projects={projects} setProjects={setProjects} setActiveId={setActiveId} tt={tt}/>}
        </div>
      </div>
    </div>
    {toast&&<div className="toast">{toast}</div>}
    {modal&&<EditModal {...modal} onSave={v=>{modal.onSave(v);setModal(null)}} onClose={()=>setModal(null)}/>}
  </div></>);
}

/* ═══ PROJECTS ═══ */
function ProjectsPage({projects,activeId,onNew,onOpen,onDel,onDup}){
  const sorted=[...projects].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return(<div style={{maxWidth:640}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><div><h2 style={{fontFamily:'Outfit',fontWeight:700,fontSize:'1.1rem'}}>Meus Projetos</h2><p style={{fontSize:'.72rem',color:'var(--txm)',marginTop:2}}>{projects.length} viagem(ns)</p></div><button className="bt bt-p" onClick={onNew}><I.plus style={{width:13,height:13}}/> Nova Viagem</button></div>
    {!sorted.length&&<div className="es"><I.folder style={{width:44,height:44}}/><p>Nenhum projeto ainda.</p></div>}
    {sorted.map((p,i)=>{const dr=p.tripDays.length?`${fBR(p.tripDays[0].date)} — ${fBR(p.tripDays[p.tripDays.length-1].date)}`:'Sem datas';const fc=getFlag(p.country)||getFlag(p.dest);return(<div key={p.id} className={`pcard ${p.id===activeId?'active':''}`} style={{animationDelay:`${i*50}ms`}} onClick={()=>onOpen(p.id)}>
      <div className="pcard-icon">{fc?<FlagImg code={fc} size={42}/>:<I.compass style={{width:20,height:20}}/>}</div>
      <div className="pcard-body"><div className="pcard-name"><FlagImg code={fc} size={20}/>{p.name||'Sem nome'}</div>{p.dest&&<div className="pcard-dest">{p.dest}</div>}<div className="pcard-meta">{p.tripDays.length} dias · {(p.cities||[]).length} cidades · {p.activities.length} ativ. · {dr}</div></div>
      <div className="pcard-actions" onClick={e=>e.stopPropagation()}><button className="bt bt-g bt-i bt-xs" onClick={()=>onDup(p.id)} title="Duplicar"><I.copy style={{width:12,height:12}}/></button><button className="bt bt-g bt-i bt-d bt-xs" onClick={()=>onDel(p.id)} title="Excluir"><I.trash style={{width:12,height:12}}/></button></div>
    </div>)})}
  </div>);
}

/* ═══ TRIP INFO ═══ */
function TripInfoPage({data,upd,tt}){
  const[n,sN]=useState(data.name||'');const[d,sD]=useState(data.dest||'');const[c,sC]=useState(data.country||'');
  useEffect(()=>{sN(data.name||'');sD(data.dest||'');sC(data.country||'')},[data.id]);
  const fc=getFlag(c)||getFlag(d);
  return(<div style={{maxWidth:520}}><div className="fc"><div className="fct">Dados do Roteiro {fc&&<FlagImg code={fc} size={22}/>}</div><div className="fg" style={{gap:12}}>
    <div className="fgr"><label className="fl">Nome do Roteiro</label><input className="fi" value={n} onChange={e=>sN(e.target.value)} placeholder="Ex: Férias de Julho 2026"/></div>
    <div className="fgr"><label className="fl">Destino</label><input className="fi" value={d} onChange={e=>sD(e.target.value)} placeholder="Ex: Roma, Florença e Veneza"/></div>
    <div className="fgr"><label className="fl">País</label><input className="fi" value={c} onChange={e=>sC(e.target.value)} placeholder="Ex: Itália"/></div>
  </div><div className="fac"><button className="bt bt-p" onClick={()=>{upd(p=>({...p,name:n.trim(),dest:d.trim(),country:c.trim()}));tt('Salvo!')}}><I.check style={{width:12,height:12}}/> Salvar</button></div></div></div>);
}

/* ═══ TRIP DAYS ═══ */
function TripDaysPage({data,upd,tt}){
  const[s,sS]=useState('');const[e,sE]=useState('');
  const setStart=v=>{sS(v);if(!e||e<=v)sE(nextDay(v))};
  const gen=()=>{if(!s||!e)return;const sd=new Date(s+'T12:00:00'),ed=new Date(e+'T12:00:00');if(ed<sd)return;const d=[];const c=new Date(sd);while(c<=ed){d.push({date:c.toISOString().split('T')[0]});c.setDate(c.getDate()+1)}upd(p=>({...p,tripDays:d}));tt(`${d.length} dias!`)};
  return(<div style={{maxWidth:640}}><div className="fc" style={{marginBottom:14}}><div className="fct">Período da Viagem</div><div className="fg fg2"><div className="fgr"><label className="fl">Data Inicial</label><input className="fi" type="date" value={s} onChange={x=>setStart(x.target.value)}/></div><div className="fgr"><label className="fl">Data Final</label><input className="fi" type="date" value={e} min={s?nextDay(s):''} onChange={x=>sE(x.target.value)}/></div></div><div className="fac"><button className="bt bt-p" onClick={gen} disabled={!s||!e}><I.calendar style={{width:11,height:11}}/> Gerar</button></div></div>
  {data.tripDays.length>0&&<table className="tb"><thead><tr><th>#</th><th>Data</th><th>Dia / Mês</th><th></th></tr></thead><tbody>{data.tripDays.map((d,i)=>{const l=pD(d.date);return <tr key={d.date}><td style={{fontWeight:600,color:'var(--txm)',width:50}}>Dia {i+1}</td><td>{fBR(d.date)}</td><td>{l.wf} — {l.dm}</td><td className="tda"><button className="bt bt-g bt-i bt-d bt-xs" onClick={()=>upd(p=>({...p,tripDays:p.tripDays.filter(x=>x.date!==d.date),activities:p.activities.filter(a=>a.date!==d.date)}))}><I.trash style={{width:10,height:10}}/></button></td></tr>})}</tbody></table>}</div>);
}

/* ═══ CITIES / ETAPAS ═══ */
function CitiesPage({data,upd,tt,em}){
  const mt={city:'',dateFrom:'',dateTo:''};
  const[f,sF]=useState(mt);const s=(k,v)=>sF(p=>({...p,[k]:v}));
  const cities=data.cities||[];
  const add=()=>{if(!f.city.trim()||!f.dateFrom||!f.dateTo)return;upd(p=>({...p,cities:[...(p.cities||[]),{...f,id:Date.now()}]}));sF(mt);tt('Cidade adicionada!')};
  const rm=id=>upd(p=>({...p,cities:(p.cities||[]).filter(c=>c.id!==id)}));
  const editC=c=>em({title:'Editar Cidade',initial:c,fields:[
    {key:'city',label:'Nome da Cidade',ph:'Ex: Roma'},
    [{key:'dateFrom',label:'Data de Chegada',type:'date'},{key:'dateTo',label:'Data de Saída',type:'date'}]
  ],onSave:v=>{upd(p=>({...p,cities:(p.cities||[]).map(x=>x.id===c.id?{...x,...v}:x)}));tt('Cidade atualizada!')}});

  // Sort by dateFrom
  const sorted=[...cities].sort((a,b)=>a.dateFrom>b.dateFrom?1:-1);
  const colors=CITY_COLORS;

  return(<div style={{maxWidth:680}}>
    <div className="fc" style={{marginBottom:14}}>
      <div className="fct"><I.mapPin style={{width:15,height:15}}/> Nova Cidade / Etapa</div>
      <p className="fhi">Cadastre cada cidade que visitará com as datas. O dashboard exibirá separadores visuais coloridos automaticamente entre as trocas de cidade.</p>
      <div className="fg" style={{gap:11}}>
        <div className="fgr"><label className="fl">Cidade</label><CityInput value={f.city} onChange={v=>s('city',v)} placeholder="Digite o nome da cidade..."/></div>
        <div className="fg fg2">
          <div className="fgr"><label className="fl">Chegada</label><input className="fi" type="date" value={f.dateFrom} onChange={e=>{s('dateFrom',e.target.value);if(!f.dateTo||f.dateTo<=e.target.value)s('dateTo',nextDay(e.target.value))}}/></div>
          <div className="fgr"><label className="fl">Saída</label><input className="fi" type="date" value={f.dateTo} min={f.dateFrom?nextDay(f.dateFrom):''} onChange={e=>s('dateTo',e.target.value)}/></div>
        </div>
      </div>
      <div className="fac"><button className="bt bt-p" onClick={add} disabled={!f.city.trim()||!f.dateFrom||!f.dateTo}><I.plus style={{width:11,height:11}}/> Adicionar</button></div>
    </div>

    {sorted.length>0&&<table className="tb"><thead><tr><th style={{width:16}}></th><th>Cidade</th><th>Chegada</th><th>Saída</th><th>Dias</th><th></th></tr></thead><tbody>
      {sorted.map((c,i)=>{
        const cc=colors[i%colors.length];
        const d1=new Date(c.dateFrom+'T12:00:00');const d2=new Date(c.dateTo+'T12:00:00');
        const numDays=Math.max(1,Math.round((d2-d1)/(86400000))+1);
        return <tr key={c.id}>
          <td><div style={{width:10,height:10,borderRadius:'50%',background:cc.t,boxShadow:`0 0 0 3px ${cc.bg}`}}/></td>
          <td style={{fontWeight:600,color:'var(--tx)'}}>{c.city}</td>
          <td>{fBR(c.dateFrom)}</td>
          <td>{fBR(c.dateTo)}</td>
          <td style={{fontWeight:600,color:'var(--pri)'}}>{numDays}</td>
          <td className="tda"><div className="tdai"><button className="bt bt-g bt-i bt-xs" onClick={()=>editC(c)}><I.edit style={{width:10,height:10}}/></button><button className="bt bt-g bt-i bt-d bt-xs" onClick={()=>rm(c.id)}><I.trash style={{width:10,height:10}}/></button></div></td>
        </tr>
      })}
    </tbody></table>}

    {sorted.length>0&&<div style={{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}}>
      {sorted.map((c,i)=>{const cc=colors[i%colors.length];return <div key={c.id} style={{display:'flex',alignItems:'center',gap:5,fontSize:'.7rem',padding:'4px 10px',borderRadius:'var(--rs)',background:cc.bg,color:cc.t,fontWeight:600,border:`1px solid ${cc.b}`}}>
        <div style={{width:6,height:6,borderRadius:'50%',background:cc.t}}/>{c.city}
      </div>})}

/* ═══ DESTINATION INFO (AI-powered) ═══ */
function DestInfoPage({data,flagCode}){
  const[info,setInfo]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const dest=data.dest||'';
  const country=data.country||'';
  const cities=(data.cities||[]).map(c=>c.city).filter(Boolean);
  const dateFrom=(data.tripDays||[])[0]?.date||'';
  const dateTo=(data.tripDays||[]).slice(-1)[0]?.date||'';
  const cacheKey='di_'+data.id;

  useEffect(()=>{
    try{const cached=JSON.parse(localStorage.getItem(cacheKey));if(cached&&cached.dest===dest)setInfo(cached)}catch(e){}
  },[]);

  const fetchInfo=()=>{
    if(!dest&&!cities.length){setError('Preencha o destino ou cadastre cidades primeiro.');return}
    setLoading(true);setError('');setInfo(null);
    const location=cities.length?cities.join(', '):dest;
    const period=dateFrom&&dateTo?('de '+fBR(dateFrom)+' a '+fBR(dateTo)):'(datas não definidas)';
    const prompt=`Você é um expert em viagens internacionais. Viajante parte de São Paulo, Brasil. Destino: ${location} (${country||''}). Período: ${period}.

Responda EXCLUSIVAMENTE em JSON válido (sem markdown, sem backticks, sem explicações), com esta estrutura:
{
  "temperatura":{"media":"ex: 18°C","minima":"ex: 8°C","maxima":"ex: 26°C","descricao":"texto curto sobre clima no período"},
  "clima":{"resumo":"ex: Primavera com dias ensolarados","condicoes":"detalhes sobre vento, umidade, sensação térmica","icone":"sun|cloud|rain|snow"},
  "precipitacao":{"chance":"ex: 35%","chanceNum":35,"dias":"ex: 8 de 14 dias","descricao":"texto sobre padrão de chuvas"},
  "moeda":{"nome":"ex: Euro","simbolo":"€","cotacao":"ex: 1 EUR ≈ R$ 6,10","dicas":"dica sobre pagamento, cartão, gorjeta"},
  "fuso":{"diferenca":"ex: +4 horas","horas":4,"descricao":"Quando são 12h em São Paulo, são 16h em Paris","gmtDestino":"ex: GMT+1"},
  "documentos":{"visto":"texto sobre visto","passaporte":"requisitos","seguro":"sobre seguro viagem","vacinas":"vacinas necessárias","alerta":"algum alerta importante ou vazio"},
  "idioma":{"oficial":"ex: Francês","cumprimento":"ex: Bonjour","obrigado":"ex: Merci","socorro":"ex: Au secours","dicas":"dica de comunicação"},
  "tomada":{"tipo":"ex: C e F","voltagem":"ex: 220V 50Hz","adaptador":"sim ou não para brasileiro","dica":"detalhes"}
}`;

    var xhr=new XMLHttpRequest();
    xhr.open('POST','/.netlify/functions/ai',true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.onload=function(){
      setLoading(false);
      try{
        var d=JSON.parse(xhr.responseText);
        if(d.error){setError('API: '+(d.error.message||d.error));return}
        if(d.type==='error'){setError('API: '+(d.error&&d.error.message||xhr.responseText.substring(0,150)));return}
        var txt=d.content?d.content.map(function(b){return b.text||''}).join(''):'';
        if(!txt){setError('Resposta vazia da API. Status: '+xhr.status);return}
        var clean=txt.replace(/```json|```/g,'').trim();
        var parsed=JSON.parse(clean);
        parsed.dest=dest;
        setInfo(parsed);
        try{localStorage.setItem(cacheKey,JSON.stringify(parsed))}catch(e){}
      }catch(e){setError('Erro parse: '+e.message+' | Resposta: '+(xhr.responseText||'').substring(0,120));console.error('[DestInfo]',e,xhr.responseText)}
    };
    xhr.onerror=function(){setLoading(false);setError('Erro de conexão. Verifique sua internet.')};
    xhr.send(JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]}));
  };

function BackupPage({projects,setProjects,setActiveId,tt}){
  const fileRef=useRef(null);const[preview,setPreview]=useState(null);
  const doExport=()=>{const j=JSON.stringify({version:3,exportedAt:new Date().toISOString(),projects},null,2);const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`roteiro-backup-${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);tt('Backup exportado!')};
  const handleFile=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.projects)return tt('Inválido');setPreview(d)}catch{tt('Erro')}};r.readAsText(file);e.target.value=''};
  const doImport=mode=>{if(!preview)return;const inc=preview.projects.map(p=>({...p,id:Date.now()+Math.random()*1e4|0}));if(mode==='replace'){setProjects(inc);if(inc.length)setActiveId(inc[0].id)}else setProjects(prev=>[...prev,...inc]);tt(`${inc.length} projeto(s) ${mode==='replace'?'restaurados':'adicionados'}!`);setPreview(null)};
  return(<div style={{maxWidth:640}}>

/* ═══ DASHBOARD ═══ */
function DashboardContent({data,flagCode}){
  const{tripDays,activities,hotels,flights,name,dest}=data;
  const hFor=d=>hotels.filter(h=>h.checkIn&&h.checkOut&&d>=h.checkIn&&d<=h.checkOut);
  const fFor=d=>flights.filter(f=>f.date===d);
  const aFor=(d,p)=>activities.filter(a=>a.date===d&&a.period===p);
  const dr=tripDays.length?`${fBR(tripDays[0].date)} — ${fBR(tripDays[tripDays.length-1].date)}`:'';
  const cities=data.cities||[];

  // Build city map: date -> city (from cities cadastro, sorted by dateFrom)
  const sortedCities=useMemo(()=>[...cities].sort((a,b)=>a.dateFrom>b.dateFrom?1:-1),[cities]);

  const cityMap=useMemo(()=>{
    const m={};
    tripDays.forEach(d=>{
      const match=sortedCities.find(c=>c.dateFrom&&c.dateTo&&d.date>=c.dateFrom&&d.date<=c.dateTo);
      m[d.date]=match?match.city:'';
    });
    return m;
  },[tripDays,sortedCities]);

  // Unique cities in order of appearance
  const cityList=useMemo(()=>{
    const seen=[];
    sortedCities.forEach(c=>{if(c.city&&!seen.includes(c.city))seen.push(c.city)});
    return seen;
  },[sortedCities]);

  const cityColor=(city)=>{const idx=cityList.indexOf(city);return idx>=0?CITY_COLORS[idx%CITY_COLORS.length]:null};

  // Build rows with city separators
  const rows=useMemo(()=>{
    const r=[];let lastCity='';
    tripDays.forEach((day,idx)=>{
      const city=cityMap[day.date]||'';
      if(city&&city!==lastCity){r.push({type:'city',city,idx});lastCity=city}
      r.push({type:'day',day,idx,city});
    });
    return r;
  },[tripDays,cityMap]);

  return(<div className="dw">
    <div className="dtb">
      {flagCode&&<img className="flag" src={`https://flagcdn.com/w80/${flagCode}.png`} alt="" onError={e=>{e.target.style.display='none'}}/>}
      {name&&<span className="dtn">{name}</span>}{dest&&<span className="dtd">{dest}</span>}{dr&&<span className="dtr">{dr}</span>}
      {!name&&!dest&&<span className="dtn">Meu Roteiro</span>}
    </div>
    <div className="dsc"><div className="dg">
      <div className="dh">Dia</div><div className="dh"><I.hotel style={{width:9,height:9}}/> Hotel / <I.plane style={{width:9,height:9}}/> Voo</div>
      {PER.map(p=><div key={p.id} className="dh"><p.ic style={{width:9,height:9}}/> {p.l}</div>)}
      {rows.map((row,ri)=>{
        if(row.type==='city'){
          const cc=cityColor(row.city);
          return <div key={'city-'+ri} className="city-row" style={{background:cc?.bg,color:cc?.t,borderColor:cc?.b,animationDelay:`${ri*30}ms`,gridColumn:'1/-1'}}>
            <span className="city-dot" style={{background:cc?.t,color:cc?.t}}/>
            <I.mapPin className="city-icon" style={{width:12,height:12}}/>
            <span>{row.city}</span>
            <span className="city-line"/>
          </div>;
        }
        const{day,idx,city}=row;const l=pD(day.date);const hs=hFor(day.date);const fs=fFor(day.date);
        const cc=cityColor(city);
        return(<React.Fragment key={day.date}>
          <div className="ddc stagger-row" style={{...(cc?{borderLeft:`3px solid ${cc.t}`,borderRadius:0}:{}),animationDelay:`${ri*30}ms`}}><span className="ddn">DIA {idx+1}</span><span className="ddw">{l.w}</span><span className="ddd">{l.dm}</span></div>
          <div className="dic">
            {hs.map(h=><div key={h.id} className="ip iph" tabIndex="0"><I.hotel style={{width:9,height:9}}/><div className="ipb"><span className="ipm">{h.name}</span><span className="ips">{h.city}</span></div><div className="ip-full"><div className="ipb"><span className="ipm"><I.hotel style={{width:10,height:10,display:'inline',verticalAlign:'middle',marginRight:4}}/>{h.name}</span><span className="ips">{h.city}{h.checkIn?' · Check-in: '+fBR(h.checkIn):''}{h.checkOut?' · Check-out: '+fBR(h.checkOut):''}{h.notes?' · '+h.notes:''}</span></div></div></div>)}
            {fs.map(f=><div key={f.id} className="ip ipf" tabIndex="0"><I.plane style={{width:9,height:9}}/><div className="ipb"><span className="ipm">{f.flightCode} {f.airline?'·'+f.airline:''}</span><span className="ips">{f.origin}→{f.destination} {f.departure?'|'+f.departure:''}</span></div><div className="ip-full"><div className="ipb"><span className="ipm"><I.plane style={{width:10,height:10,display:'inline',verticalAlign:'middle',marginRight:4}}/>{f.flightCode}{f.airline?' · '+f.airline:''}</span><span className="ips">{f.origin} → {f.destination}{f.date?' · '+fBR(f.date):''}{f.departure?' · '+f.departure:''}{'→'}{f.arrival||'?'}{f.notes?' · '+f.notes:''}</span></div></div></div>)}
            {!hs.length&&!fs.length&&<span style={{fontSize:'.52rem',color:'var(--txm)',textAlign:'center'}}>—</span>}
          </div>
          {PER.map(p=><div key={p.id} className={`dce ${p.c}`}>{aFor(day.date,p.id).map(a=>{const cat=CAT.find(c=>c.id===a.category);return(<div key={a.id} className={`ac ${cat?.c||''}`}>{cat&&<cat.ic style={{width:9,height:9}}/>}<span className="at">{a.title}</span>{a.time&&<span className="atm">{a.time}</span>}</div>)})}</div>)}
        </React.Fragment>);
      })}
    </div></div>
    <div className="lgr">
      {CAT.map(c=><div key={c.id} className="lgi"><div className="lgd" style={{background:c.co}}/>{c.l}</div>)}
      <div style={{width:1,height:10,background:'var(--brd)',margin:'0 3px'}}/>
      {cityList.map(c=>{const cc=cityColor(c);return <div key={c} className="lgi"><div className="lgd" style={{background:cc?.t,borderRadius:'50%'}}/>{c}</div>})}
    </div>
  </div>);
}

function FinancePage({data,upd,tt,em}){
  const expenses=data.expenses||[];
  const mt={description:'',category:'refeicao',amount:'',date:'',notes:''};
  const[f,sF]=useState(mt);const s=(k,v)=>sF(p=>({...p,[k]:v}));
  const add=()=>{if(!f.description.trim()||!f.amount)return;upd(p=>({...p,expenses:[...(p.expenses||[]),{...f,amount:parseFloat(f.amount)||0,id:Date.now()}]}));sF(mt);tt('Despesa adicionada!')};
  const rm=id=>upd(p=>({...p,expenses:(p.expenses||[]).filter(e=>e.id!==id)}));
  const editE=e=>em({title:'Editar Despesa',initial:{...e,amount:String(e.amount)},fields:[
    {key:'description',label:'Descrição',ph:'Ex: Jantar restaurante'},
    [{key:'category',label:'Categoria',type:'select',opts:FIN_CATS.map(c=>({v:c.id,l:c.l}))},{key:'amount',label:'Valor R$',type:'number',ph:'0.00'}],
    {key:'notes',label:'Obs',ph:'Detalhes...'}
  ],onSave:v=>{upd(p=>({...p,expenses:(p.expenses||[]).map(x=>x.id===e.id?{...x,...v,amount:parseFloat(v.amount)||0}:x)}));tt('Atualizada!')}});

  // Totals by category
  const totals=useMemo(()=>{
    const t={};FIN_CATS.forEach(c=>t[c.id]=0);
    expenses.forEach(e=>{if(t[e.category]!==undefined)t[e.category]+=e.amount;else t.outros+=e.amount});
    return t;
  },[expenses]);
  const grandTotal=expenses.reduce((s,e)=>s+(e.amount||0),0);
  const sorted=[...expenses].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const dOpts=data.tripDays.map((d,i)=>({v:d.date,l:`Dia ${i+1} — ${pD(d.date).w} ${pD(d.date).dm}`}));

  return(<div style={{maxWidth:800}} className="page-enter">
    {/* Summary cards */}
    <div className="fin-grid">
      <div className="fin-card fin-total" style={{gridColumn:'1/-1'}}>
        <div className="fin-label">Total Geral</div>
        <div className="fin-val">R$ {grandTotal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      </div>
      {FIN_CATS.filter(c=>totals[c.id]>0).map((c,i)=>(
        <div key={c.id} className="fin-card" style={{animationDelay:`${(i+1)*50}ms`}}>
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:3,background:c.color,opacity:.6,borderRadius:'0 0 11px 11px'}}/>
          <div className="fin-icon" style={{background:c.color+'18',color:c.color}}><c.icon style={{width:16,height:16}}/></div>
          <div className="fin-val" style={{color:c.color}}>R$ {totals[c.id].toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
          <div className="fin-label">{c.l}</div>
        </div>
      ))}
    </div>

    {/* Chart */}
    {expenses.length>0&&<div className="chb" style={{marginBottom:14}}><h3>Distribuição de Gastos</h3><canvas ref={el=>{
      if(!el)return;
      const existing=Chart.getChart(el);if(existing)existing.destroy();
      const dk=document.documentElement.getAttribute('data-theme')==='dark';
      new Chart(el,{type:'doughnut',data:{
        labels:FIN_CATS.filter(c=>totals[c.id]>0).map(c=>c.l),
        datasets:[{data:FIN_CATS.filter(c=>totals[c.id]>0).map(c=>totals[c.id]),backgroundColor:FIN_CATS.filter(c=>totals[c.id]>0).map(c=>c.color),borderWidth:0}]
      },options:{responsive:true,maintainAspectRatio:true,cutout:'65%',plugins:{legend:{position:'right',labels:{color:dk?'#A8A8AB':'#58585B',font:{family:'DM Sans',size:11},padding:8,usePointStyle:true}}}}});
    }} style={{maxHeight:200}}/></div>}

    {/* Add form */}
    <div className="fc" style={{marginBottom:14}}>
      <div className="fct"><I.dollar style={{width:14,height:14}}/> Nova Despesa</div>
      <div className="fg" style={{gap:10}}>
        <div className="fgr"><label className="fl">Descrição</label><input className="fi" value={f.description} onChange={e=>s('description',e.target.value)} placeholder="Ex: Ingresso Coliseu"/></div>
        <div className="fg fg2">
          <div className="fgr"><label className="fl">Categoria</label><select className="fsel" value={f.category} onChange={e=>s('category',e.target.value)}>{FIN_CATS.map(c=><option key={c.id} value={c.id}>{c.l}</option>)}</select></div>
          <div className="fgr"><label className="fl">Valor R$</label><input className="fi" type="number" step="0.01" min="0" value={f.amount} onChange={e=>s('amount',e.target.value)} placeholder="0,00"/></div>
        </div>
        <div className="fgr"><label className="fl">Observação (opc.)</label><input className="fi" value={f.notes} onChange={e=>s('notes',e.target.value)} placeholder="Detalhes..."/></div>
      </div>
      <div className="fac"><button className="bt bt-p" onClick={add} disabled={!f.description.trim()||!f.amount}><I.plus style={{width:11,height:11}}/> Adicionar</button></div>
    </div>

    {/* Table */}
    {sorted.length>0&&<table className="fin-table"><thead><tr><th>Descrição</th><th>Categoria</th><th>Valor</th><th></th></tr></thead><tbody>
      {sorted.map(e=>{const cat=FIN_CATS.find(c=>c.id===e.category);return(
        <tr key={e.id}>
          <td style={{fontWeight:500,color:'var(--tx)'}}>{e.description}{e.notes?<span style={{fontSize:'.66rem',color:'var(--txm)',marginLeft:6}}>{e.notes}</span>:null}</td>
          <td><span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:'.7rem'}}>{cat&&<cat.icon style={{width:11,height:11,color:cat.color}}/>}{cat?.l||e.category}</span></td>
          <td className="ft-val">R$ {(e.amount||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
          <td className="tda"><div className="tdai"><button className="bt bt-g bt-i bt-xs" onClick={()=>editE(e)}><I.edit style={{width:10,height:10}}/></button><button className="bt bt-g bt-i bt-d bt-xs" onClick={()=>rm(e.id)}><I.trash style={{width:10,height:10}}/></button></div></td>
        </tr>
      )})}
      <tr><td colSpan="2" style={{fontWeight:700,textAlign:'right',color:'var(--tx)'}}>TOTAL</td><td className="ft-val" style={{fontSize:'.88rem'}}>R$ {grandTotal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td><td/></tr>
    </tbody></table>}
  </div>);
}

/* ═══ STATS ═══ */
function StatsPage({data}){
  const r1=useRef(null),r2=useRef(null),c1=useRef(null),c2=useRef(null);
  const cc=useMemo(()=>{const m={};CAT.forEach(c=>m[c.id]=0);data.activities.forEach(a=>{if(m[a.category]!==undefined)m[a.category]++});return m},[data.activities]);
  const dc=useMemo(()=>data.tripDays.map((d,i)=>({l:`D${i+1} ${pD(d.date).w}`,n:data.activities.filter(a=>a.date===d.date).length})),[data]);
  useEffect(()=>{if(!r1.current)return;if(c1.current)c1.current.destroy();const dk=document.documentElement.getAttribute('data-theme')==='dark';const t=dk?'#A8A8AB':'#58585B';c1.current=new Chart(r1.current,{type:'doughnut',data:{labels:CAT.map(c=>c.l),datasets:[{data:CAT.map(c=>cc[c.id]),backgroundColor:CAT.map(c=>c.co),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:t,font:{family:'DM Sans',size:10},padding:8,usePointStyle:true,pointStyleWidth:7}}}}})},[cc]);
  useEffect(()=>{if(!r2.current)return;if(c2.current)c2.current.destroy();const dk=document.documentElement.getAttribute('data-theme')==='dark';const t=dk?'#A8A8AB':'#58585B';const g=dk?'rgba(255,255,255,.05)':'rgba(0,0,0,.06)';c2.current=new Chart(r2.current,{type:'bar',data:{labels:dc.map(d=>d.l),datasets:[{data:dc.map(d=>d.n),backgroundColor:'rgba(116,30,34,.72)',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:t,font:{family:'DM Sans',size:9},maxRotation:45},grid:{display:false}},y:{beginAtZero:true,ticks:{color:t,stepSize:1,font:{family:'DM Sans',size:9}},grid:{color:g}}}}})},[dc]);
  return(<div><div className="str" style={{marginBottom:14}}><div className="stc"><div className="stn">{data.tripDays.length}</div><div className="stl">Dias</div></div><div className="stc"><div className="stn">{data.activities.length}</div><div className="stl">Atividades</div></div><div className="stc"><div className="stn">{data.hotels.length}</div><div className="stl">Hotéis</div></div><div className="stc"><div className="stn">{data.flights.length}</div><div className="stl">Voos</div></div></div><div className="chr"><div className="chb"><h3>Por Categoria</h3><canvas ref={r1} style={{maxHeight:190}}/></div><div className="chb"><h3>Por Dia</h3><canvas ref={r2} style={{maxHeight:190}}/></div></div></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister()})})}
if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone){document.documentElement.classList.add('pwa-standalone')}
</script>
